# workload-lifecycle — gated single writer for workload state (deterministic, no
# LLM — plain Actions YAML, not gh-aw, by design; it NEEDS direct issues/actions
# writes for label flips, run cancellation, close+lock).
# Step 1 runs lifecycle-gate (tracer: L0/L1; L2–L9 join with US10–US13); a red gate
# reports unmet items and performs nothing. Step 2 flips the workload:* label,
# appends the workload-event:v1 comment, and close+locks on archive. There is no
# delete action anywhere — unknown actions exit 2 (FR-042), and `delete` is not
# offered in the dispatch choices.
# Two entry points, one writer: repository_dispatch (dashboard / API callers,
# actor from the payload) and workflow_dispatch (Actions-tab UI, actor is the
# clicking user — github.actor, never spoofable via inputs).
# cost ceiling: $0 per run (constitution: Cost & Observability)
name: workload-lifecycle
on:
  repository_dispatch:
    types: [workload-lifecycle]
  workflow_dispatch:
    inputs:
      workload:
        description: "Workload slug"
        required: true
      action:
        description: "Lifecycle transition"
        type: choice
        required: true
        options: [activate, complete, cancel, defer, reactivate, archive]
      reason:
        description: "Reason (recorded in the event comment; required by gate for cancel/defer)"
        required: false
      revisit:
        description: "Revisit date YYYY-MM-DD (defer only)"
        required: false
permissions:
  contents: read
  issues: write # workload:* labels + event comments — this workflow is their ONLY writer
  actions: write # cancel in-flight runs on workload cancel (SC-014)
concurrency:
  group: workload-lifecycle-${{ github.event.client_payload.workload || inputs.workload }}
env:
  WL_WORKLOAD: ${{ github.event.client_payload.workload || inputs.workload }}
  WL_ACTION: ${{ github.event.client_payload.action || inputs.action }}
  WL_ACTOR: ${{ github.event_name == 'workflow_dispatch' && github.actor || github.event.client_payload.actor }}
  WL_REASON: ${{ github.event.client_payload.reason || inputs.reason }}
  WL_REVISIT: ${{ github.event.client_payload.revisit || inputs.revisit }}
jobs:
  transition:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: lifecycle-gate (refusal performs nothing)
        run: >-
          npx tsx scripts/gates/lifecycle-gate.ts
          --workload "$WL_WORKLOAD"
          --action "$WL_ACTION"
          --repo ${{ github.repository }} --json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: apply transition (label flip + event comment; close+lock on archive)
        run: >-
          npx tsx scripts/lifecycle-apply.ts
          --workload "$WL_WORKLOAD"
          --action "$WL_ACTION"
          --actor "$WL_ACTOR"
          --reason "$WL_REASON"
          --revisit "$WL_REVISIT"
          --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
