# plan-publish — deterministic writer for agent-proposed plans (plain Actions
# YAML, no LLM — by design: the plan-propose agentic job is read-only and its
# safe outputs cannot push branches). On plan-propose completion: downloads the
# uploaded plan.json artifact, validates it against schemas/plan.schema.json,
# locates the run's Andon break (andon:v1 header, else the gh-aw footer link to
# this triggering run — the safe-output sanitizer strips agent HTML comments, so
# the publisher injects the canonical header), patches the real andon_issue
# number in, and creates plan/<slug>/v<N> with plan.json committed.
# RESUMABLE on re-delivery or partial publish (existing branch/file completed,
# unchanged content = no-op); an existing frozen TAG for the version is a hard
# error (agent must bump). Substrate split: agent proposes, deterministic
# single writer publishes/normalizes.
# cost ceiling: $0 per run (constitution: Cost & Observability)
name: plan-publish
on:
  workflow_run:
    # MUST match the compiled workflow's `name:` exactly (workflow_run keys on the name,
    # not the file/workflow id) — drift is caught by tests/unit/workflow-linkage.test.ts.
    workflows: ["plan-propose — agent proposes a plan and raises an Andon break"]
    types: [completed]
permissions:
  contents: write # plan/<slug>/v<N> branch + plan.json commit — the only writer of unfrozen plan branches
  issues: write # locate the Andon break (gh-aw footer run-link) + inject the andon:v1 header the safe-output sanitizer strips
concurrency:
  group: plan-publish-${{ github.event.workflow_run.id }}
jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: download the proposed plan artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/plan-artifacts
      - name: publish plan branch (validate, patch andon_issue, branch + commit)
        run: >-
          npx tsx scripts/plan-publish.ts
          --dir "$RUNNER_TEMP/plan-artifacts"
          --repo ${{ github.repository }}
          --run-id ${{ github.event.workflow_run.id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
