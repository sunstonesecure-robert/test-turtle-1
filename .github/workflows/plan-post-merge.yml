# plan-post-merge — the single writer that freezes an approved plan (deterministic,
# no LLM — plain Actions YAML, not gh-aw, by design; it NEEDS direct contents/issues
# writes, which gh-aw strict mode rightly forbids for agentic jobs).
# On merge of an approval PR from plan/<slug>/v<N>: (1) annotated tag at the merge
# SHA — create-ref fails if it exists, first writer wins (FR-027, SC-008); tag
# message records approver + timestamp (FR-006, FR-026); (2) plans/<slug>/CURRENT →
# the new tag; (3) andon:resolved on the plan's Andon issue (FR-007).
# cost ceiling: $0 per run (constitution: Cost & Observability)
name: plan-post-merge
on:
  pull_request:
    types: [closed]
    branches: [main]
permissions:
  contents: write # tag + CURRENT pointer — this workflow is their ONLY writer
  issues: write # andon:resolved
concurrency:
  group: plan-post-merge-${{ github.event.pull_request.head.ref }}
jobs:
  freeze:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'plan/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: freeze approved plan (single writer)
        run: npx tsx scripts/gates/post-merge-freeze.ts --pr ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
